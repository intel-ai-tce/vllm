
global:
  scrape_interval: 5s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['localhost:9100']

  - job_name: gpu
    static_configs:
      - targets: ['localhost:9400']

  - job_name: vllm-gpu
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:8000']

  - job_name: vllm-cpu
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:8001']
