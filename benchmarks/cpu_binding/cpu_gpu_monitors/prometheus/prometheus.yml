global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: dcgm-exporter
    static_configs:
      - targets: ['host.docker.internal:9400']

  - job_name: vllm-gpu
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          model_role: writer
          accelerator: gpu

  - job_name: vllm-cpu
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8001']
        labels:
          model_role: researcher-reviewer
          accelerator: cpu
